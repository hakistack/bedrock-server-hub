name: Portable Windows build

# Builds the standalone portable .exe (no installer).
# - On every push to main / PR: uploads the exe as a build artifact.
# - On a version tag (vX.Y.Z): also attaches the exe to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required to create/attach releases on tag builds

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # --no-bundle => produce ONLY the executable (no MSI/NSIS installer),
      # so no WiX/NSIS toolchain is needed and the result is portable.
      - name: Build portable executable
        run: npm run tauri -- build --no-bundle

      - name: Stage portable artifact
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $exe = Get-ChildItem -Path $releaseDir -Filter *.exe -File |
            Where-Object { $_.Name -notlike "*build-script*" } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Error "No se encontró el ejecutable en $releaseDir"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName "dist/BedrockServerManager.exe"
          Write-Host "Portable exe: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockServerManager-windows-portable
          path: dist/BedrockServerManager.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BedrockServerManager.exe
          generate_release_notes: true
